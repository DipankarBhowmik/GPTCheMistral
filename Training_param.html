<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Training Config Table</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f5f5f5;
    }
    h2 {
      text-align: center;
    }
    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 70%;
      background: white;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: left;
    }
    th {
      background-color: #333;
      color: white;
    }
    tr:nth-child(even) {
      background-color: #f9f9f9;
    }
  </style>
</head>
<body>

  <h2>Training Configuration</h2>

  <table>
    <thead>
      <tr>
        <th>Setting</th>
        <th>Value</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Epochs</td>
        <td>3</td>
      </tr>
      <tr>
        <td>Batch size</td>
        <td>4 (per device)</td>
      </tr>
      <tr>
        <td>Gradient accumulation</td>
        <td>2 steps (effective batch = 8)</td>
      </tr>
      <tr>
        <td>Learning rate</td>
        <td>2e-4 with cosine schedule</td>
      </tr>
      <tr>
        <td>Warmup ratio</td>
        <td>0.03</td>
      </tr>
      <tr>
        <td>Precision</td>
        <td>FP16</td>
      </tr>
      <tr>
        <td>Eval &amp; save interval</td>
        <td>Every 50 steps</td>
      </tr>
      <tr>
        <td>Checkpoints kept</td>
        <td>Last 5 only</td>
      </tr>
    </tbody>
  </table>

</body>
</html>
